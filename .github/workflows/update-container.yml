name: Update apple/container CLI

on:
  schedule:
    - cron: '0 8 * * 3'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT=$(grep 'version ?' package.nix | sed 's/.*"\(.*\)".*/\1/')
          LATEST=$(gh release view --repo apple/container --json tagName -q .tagName)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Already up to date
        if: steps.versions.outputs.current == steps.versions.outputs.latest
        run: echo "apple/container is already up to date (${{ steps.versions.outputs.current }})"

      - name: Update package.nix
        if: steps.versions.outputs.current != steps.versions.outputs.latest
        run: |
          LATEST="${{ steps.versions.outputs.latest }}"
          URL="https://github.com/apple/container/releases/download/${LATEST}/container-${LATEST}-installer-signed.pkg"
          SHA256_HEX=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          SRI="sha256-$(echo "$SHA256_HEX" | xxd -r -p | base64 -w0)"
          sed -i "s|version ? \".*\"|version ? \"${LATEST}\"|" package.nix
          sed -i "s|hash ? \".*\"|hash ? \"${SRI}\"|" package.nix
          echo "Updated package.nix to $LATEST (hash: $SRI)"

      - name: Commit and push
        if: steps.versions.outputs.current != steps.versions.outputs.latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix
          git commit -m "chore: bump apple/container to ${{ steps.versions.outputs.latest }}"
          git push origin master
